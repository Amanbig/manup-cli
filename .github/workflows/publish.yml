name: Publish Package & Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to NPM Registry (unscoped: manup-cli)
        id: npm_publish
        uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
          check-version: true

      - name: Publish to GitHub Packages (scoped: @amanbig/manup-cli)
        if: steps.npm_publish.outputs.type != 'none'
        continue-on-error: true
        run: |
          npm config set //npm.pkg.github.com/:_authToken "${{ secrets.GITHUB_TOKEN }}"
          node -e 'const fs=require("fs"); const pkg=JSON.parse(fs.readFileSync("./package.json")); pkg.name="@amanbig/manup-cli"; fs.writeFileSync("./package.json", JSON.stringify(pkg,null,2));'
          npm publish --registry=https://npm.pkg.github.com

      - name: Create GitHub Release & Tag
        if: steps.npm_publish.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.npm_publish.outputs.version }}'
          name: 'Release v${{ steps.npm_publish.outputs.version }}'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
